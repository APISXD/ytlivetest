<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Live Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #ff0000;
      --accent2: #ff4444;
      --text: #e8e8e8;
      --muted: #888;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .logo svg { color: var(--accent); }

    .url-bar {
      flex: 1;
      display: flex;
      gap: 8px;
    }

    .url-bar input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-bar input:focus { border-color: var(--accent); }
    .url-bar input::placeholder { color: var(--muted); }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { background: var(--accent2); }
    .btn:active { transform: scale(0.97); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: var(--surface2); }

    .toggle-chat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 14px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .toggle-chat:hover { background: var(--border); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 20px;
      gap: 16px;
    }

    .player-area {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .player-wrap {
      flex: 1;
      min-width: 0;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 16/9;
      position: relative;
    }

    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--muted);
    }

    .placeholder-icon {
      width: 72px;
      height: 72px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder-icon svg { color: var(--muted); }

    .placeholder p { font-size: 15px; }
    .placeholder span { font-size: 13px; color: #555; }

    .examples {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .examples button {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .examples button:hover { background: var(--border); }

    #yt-player {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      position: absolute;
      inset: 0;
    }

    .chat-panel {
      width: 340px;
      flex-shrink: 0;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      display: none;
      flex-direction: column;
      /* Tinggi mengikuti video */
    }

    .chat-header {
      background: var(--surface);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #yt-chat {
      width: 100%;
      flex: 1;
      border: none;
      background: #fff;
      min-height: 400px;
    }

    .info-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--surface);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--muted);
    }

    .info-bar svg { flex-shrink: 0; }

    .status-msg {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-left: auto;
    }

    .status-live { background: var(--accent); color: #fff; }
    .status-video { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    footer {
      text-align: center;
      padding: 12px;
      font-size: 12px;
      color: #444;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      .player-area { flex-direction: column; }
      .chat-panel { width: 100%; }
      #yt-chat { min-height: 350px; }
      header { flex-wrap: wrap; gap: 8px; }
      .logo { min-width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
    YouTube Live
  </div>
  <div class="url-bar">
    <input id="yt-url" type="text" placeholder="Masukkan URL YouTube (video / live stream)..." />
    <button class="btn" onclick="loadVideo()">Tampilkan</button>
    <button class="toggle-chat" onclick="toggleChat()" id="chat-btn">💬 Chat</button>
  </div>
</header>

<main>
  <div class="player-area" id="player-area">
    <div class="player-wrap" id="player-wrap">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <p>Masukkan URL YouTube di atas</p>
        <span>Mendukung video biasa &amp; live stream</span>
        <div class="examples">
          <button onclick="loadExample('jfKfPfyJRdk', true)">▶ Contoh: Live Stream</button>
          <button onclick="loadExample('dQw4w9WgXcQ', false)">▶ Contoh: Video Biasa</button>
        </div>
      </div>
      <iframe id="yt-player" allowfullscreen
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
      </iframe>
    </div>

    <div class="chat-panel" id="chat-panel">
      <div class="chat-header">
        <div class="live-dot"></div>
        Live Chat
      </div>
      <iframe id="yt-chat"></iframe>
    </div>
  </div>

  <div class="info-bar" id="info-bar" style="display:none;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    <span id="info-text">Live chat otomatis muncul untuk live stream. Untuk video biasa, chat mungkin tidak tersedia.</span>
    <span class="status-msg status-video" id="status-badge">VIDEO</span>
  </div>
</main>

<footer>
  YouTube Live Viewer &mdash; Pastikan website ini dihosting di domain yang terdaftar agar live chat bisa muncul.
</footer>

<script>
  var chatVisible = true;
  var currentVid = null;

  function extractVideoId(url) {
    if (!url) return null;
    url = url.trim();
    var patterns = [
      /[?&]v=([a-zA-Z0-9_-]{11})/,
      /youtu\.be\/([a-zA-Z0-9_-]{11})/,
      /youtube\.com\/live\/([a-zA-Z0-9_-]{11})/,
      /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
    ];
    for (var i = 0; i < patterns.length; i++) {
      var m = url.match(patterns[i]);
      if (m) return m[1];
    }
    if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
    return null;
  }

  function loadVideo() {
    var url = document.getElementById('yt-url').value;
    var vid = extractVideoId(url);
    if (!vid) {
      alert('URL YouTube tidak valid.\nContoh: https://www.youtube.com/watch?v=jfKfPfyJRdk');
      return;
    }
    showPlayer(vid);
  }

  function showPlayer(vid) {
    currentVid = vid;
    var player = document.getElementById('yt-player');
    var placeholder = document.getElementById('placeholder');
    var chatPanel = document.getElementById('chat-panel');
    var chat = document.getElementById('yt-chat');
    var infoBar = document.getElementById('info-bar');

    player.src = 'https://www.youtube.com/embed/' + vid + '?autoplay=1&rel=0';
    player.style.display = 'block';
    placeholder.style.display = 'none';

    // Live chat — domain harus sesuai hosting
    chat.src = 'https://www.youtube.com/live_chat?v=' + vid + '&embed_domain=' + window.location.hostname;

    if (chatVisible) {
      chatPanel.style.display = 'flex';
    }

    // Sinkronkan tinggi chat dengan player
    syncChatHeight();

    infoBar.style.display = 'flex';
  }

  function syncChatHeight() {
    setTimeout(function () {
      var wrap = document.getElementById('player-wrap');
      var chat = document.getElementById('yt-chat');
      if (wrap) {
        var h = wrap.getBoundingClientRect().height;
        if (h > 0) chat.style.minHeight = h + 'px';
      }
    }, 100);
  }

  function toggleChat() {
    chatVisible = !chatVisible;
    var chatPanel = document.getElementById('chat-panel');
    var btn = document.getElementById('chat-btn');
    if (currentVid) {
      chatPanel.style.display = chatVisible ? 'flex' : 'none';
    }
    btn.textContent = chatVisible ? '💬 Sembunyikan Chat' : '💬 Tampilkan Chat';
  }

  function loadExample(vid, isLive) {
    document.getElementById('yt-url').value = 'https://www.youtube.com/watch?v=' + vid;
    var badge = document.getElementById('status-badge');
    if (isLive) {
      badge.textContent = 'LIVE';
      badge.className = 'status-msg status-live';
    } else {
      badge.textContent = 'VIDEO';
      badge.className = 'status-msg status-video';
    }
    showPlayer(vid);
  }

  // Enter key
  document.getElementById('yt-url').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadVideo();
  });

  window.addEventListener('resize', syncChatHeight);
</script>
</body>
</html>
