<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>STREAM — YouTube Live Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080d;--bg2:#0d0f18;--surface:#111420;--surface2:#181c2e;
  --border:#1e2340;--border2:#252b45;
  --red:#ff2b2b;--red2:#ff5555;--red-glow:rgba(255,43,43,0.18);
  --text:#eef0ff;--muted:#5a6080;--muted2:#8890b0;--r:12px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;display:flex;flex-direction:column;height:100vh;position:relative;}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
body::before{width:600px;height:600px;background:radial-gradient(circle,rgba(255,43,43,0.07) 0%,transparent 70%);top:-200px;left:-150px;}
body::after{width:500px;height:500px;background:radial-gradient(circle,rgba(60,80,255,0.06) 0%,transparent 70%);bottom:-150px;right:-100px;}
.grain{position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1;opacity:0.35;}

header{position:relative;z-index:10;display:flex;align-items:center;gap:14px;padding:12px 20px;background:rgba(13,15,24,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);animation:slideDown 0.5s ease both;}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}

.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.logo-icon{width:34px;height:34px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--red-glow);transition:box-shadow 0.3s;}
.logo-icon:hover{box-shadow:0 0 36px rgba(255,43,43,0.4)}
.logo-icon svg{color:#fff}
.logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:0.08em;color:var(--text);}
.logo-text span{color:var(--red)}

.url-form{flex:1;display:flex;gap:8px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:4px 4px 4px 14px;transition:border-color 0.2s,box-shadow 0.2s;}
.url-form:focus-within{border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow);}
.url-form input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;min-width:0;}
.url-form input::placeholder{color:var(--muted)}

.btn-load{background:var(--red);color:#fff;border:none;border-radius:9px;padding:8px 22px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:0.04em;transition:background 0.2s,transform 0.1s,box-shadow 0.2s;white-space:nowrap;}
.btn-load:hover{background:var(--red2);box-shadow:0 0 18px var(--red-glow)}
.btn-load:active{transform:scale(0.96)}

.btn-chat{background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:8px 14px;color:var(--muted2);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.btn-chat:hover{color:var(--text);background:var(--surface)}
.btn-chat.active{border-color:var(--red);color:var(--red);background:rgba(255,43,43,0.06);}
.btn-chat svg{width:15px;height:15px}

main{position:relative;z-index:2;flex:1;overflow:hidden;display:flex;flex-direction:column;padding:14px 18px;gap:12px;}

.player-row{flex:1;display:flex;gap:12px;min-height:0;}

.player-wrap{flex:1;min-width:0;position:relative;border-radius:var(--r);overflow:hidden;background:#000;animation:fadeUp 0.6s 0.1s ease both;}
.player-wrap::before{content:'';position:absolute;inset:-1px;border-radius:calc(var(--r) + 1px);background:linear-gradient(135deg,rgba(255,43,43,0.25),transparent 50%,rgba(60,80,255,0.12));z-index:1;pointer-events:none;}
.player-wrap::after{content:'';position:absolute;inset:0;border-radius:var(--r);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.04);z-index:2;pointer-events:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:3;background:radial-gradient(ellipse at center,#12142a 0%,#07080d 70%);}
.ph-ring{position:relative;width:80px;height:80px;}
.ph-ring::before{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid var(--border2);animation:spin 8s linear infinite;border-top-color:var(--red);}
.ph-ring::after{content:'';position:absolute;inset:8px;border-radius:50%;border:1px solid var(--border);animation:spin 5s linear infinite reverse;border-right-color:rgba(60,80,255,0.5);}
@keyframes spin{to{transform:rotate(360deg)}}
.ph-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.ph-icon svg{color:var(--muted2)}
.ph-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);letter-spacing:0.06em;}
.ph-sub{font-size:13px;color:var(--muted);text-align:center;max-width:280px;line-height:1.6}
.examples{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.examples button{background:var(--surface2);border:1px solid var(--border2);border-radius:20px;color:var(--muted2);font-size:12px;font-family:'Outfit',sans-serif;font-weight:500;padding:6px 14px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px;}
.examples button:hover{border-color:var(--red);color:var(--red);background:rgba(255,43,43,0.06)}
.examples button::before{content:'▶';font-size:9px}

#yt-player{position:absolute;inset:0;width:100%;height:100%;border:none;display:none;z-index:3;}

.chat-panel{width:320px;flex-shrink:0;display:none;flex-direction:column;border-radius:var(--r);overflow:hidden;border:1px solid var(--border2);background:var(--surface);}
.chat-panel.show{display:flex;animation:slideLeft 0.3s ease both;}
@keyframes slideLeft{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

.chat-header{padding:11px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(255,43,43,0.12);border:1px solid rgba(255,43,43,0.25);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:600;color:var(--red);letter-spacing:0.06em;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse 1.4s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
.chat-label{font-size:13px;font-weight:500;color:var(--muted2);}
#yt-chat{flex:1;width:100%;border:none;min-height:300px;background:#fff;}

.status-bar{display:none;align-items:center;gap:10px;padding:9px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--muted2);}
.status-bar.show{display:flex;animation:fadeUp 0.4s ease both;}
.status-bar svg{flex-shrink:0;opacity:0.5}
.status-pill{margin-left:auto;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.05em;}
.pill-live{background:rgba(255,43,43,0.15);color:var(--red);border:1px solid rgba(255,43,43,0.3)}
.pill-video{background:var(--surface2);color:var(--muted2);border:1px solid var(--border2)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

@media(max-width:768px){
  .player-row{flex-direction:column}
  .chat-panel{width:100%}
  header{flex-wrap:wrap}
  .url-form{order:3;flex:0 0 100%}
}
</style>
</head>
<body>
<div class="grain"></div>

<header>
  <a class="logo" href="#">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <span class="logo-text">STR<span>E</span>AM</span>
  </a>
  <div class="url-form">
    <input id="yt-url" type="text" placeholder="Tempel URL YouTube… lalu tekan Enter" autocomplete="off" spellcheck="false"/>
    <button class="btn-load" onclick="loadVideo()">Muat</button>
  </div>
  <button class="btn-chat" id="chat-btn" onclick="toggleChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Live Chat
  </button>
</header>

<main>
  <div class="player-row">
    <div class="player-wrap" id="player-wrap">
      <div class="placeholder" id="placeholder">
        <div class="ph-ring">
          <div class="ph-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/></svg>
          </div>
        </div>
        <p class="ph-title">SIAP STREAMING</p>
        <p class="ph-sub">Tempel URL video atau live stream YouTube di atas, lalu klik <strong>Muat</strong></p>
        <div class="examples">
          <button onclick="loadExample('jfKfPfyJRdk',true)">Live Stream</button>
          <button onclick="loadExample('dQw4w9WgXcQ',false)">Video Biasa</button>
        </div>
      </div>
      <iframe id="yt-player" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
    </div>

    <div class="chat-panel" id="chat-panel">
      <div class="chat-header">
        <div class="live-badge"><div class="live-dot"></div>LIVE</div>
        <span class="chat-label">Live Chat</span>
      </div>
      <iframe id="yt-chat"></iframe>
    </div>
  </div>

  <div class="status-bar" id="status-bar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    <span>Live chat aktif untuk live stream. Video biasa mungkin tidak memiliki live chat.</span>
    <span class="status-pill pill-video" id="status-pill">VIDEO</span>
  </div>
</main>

<script>
var chatVisible=false,currentVid=null;
function extractId(u){
  if(!u)return null;u=u.trim();
  var pts=[/[?&]v=([a-zA-Z0-9_-]{11})/,/youtu\.be\/([a-zA-Z0-9_-]{11})/,/youtube\.com\/live\/([a-zA-Z0-9_-]{11})/,/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/];
  for(var i=0;i<pts.length;i++){var m=u.match(pts[i]);if(m)return m[1];}
  if(/^[a-zA-Z0-9_-]{11}$/.test(u))return u;return null;
}
function loadVideo(){
  var vid=extractId(document.getElementById('yt-url').value);
  if(!vid){alert('URL YouTube tidak dikenali.\n\nContoh:\nhttps://www.youtube.com/watch?v=jfKfPfyJRdk');return;}
  showPlayer(vid,null);
}
function showPlayer(vid,isLive){
  currentVid=vid;
  var pl=document.getElementById('yt-player'),ph=document.getElementById('placeholder');
  var cp=document.getElementById('chat-panel'),chat=document.getElementById('yt-chat');
  var sb=document.getElementById('status-bar'),pill=document.getElementById('status-pill');
  pl.src='https://www.youtube.com/embed/'+vid+'?autoplay=1&rel=0';
  pl.style.display='block';ph.style.display='none';
  chat.src='https://www.youtube.com/live_chat?v='+vid+'&embed_domain='+window.location.hostname;
  if(chatVisible)cp.classList.add('show');
  sb.classList.add('show');
  if(isLive){pill.textContent='LIVE';pill.className='status-pill pill-live';}
  else{pill.textContent='VIDEO';pill.className='status-pill pill-video';}
  syncHeight();
}
function loadExample(vid,live){
  document.getElementById('yt-url').value='https://www.youtube.com/watch?v='+vid;
  showPlayer(vid,live);
}
function toggleChat(){
  chatVisible=!chatVisible;
  var cp=document.getElementById('chat-panel'),btn=document.getElementById('chat-btn');
  if(currentVid){if(chatVisible)cp.classList.add('show');else cp.classList.remove('show');}
  btn.classList.toggle('active',chatVisible);
  syncHeight();
}
function syncHeight(){
  setTimeout(function(){
    var w=document.getElementById('player-wrap'),c=document.getElementById('yt-chat');
    if(w){var h=w.getBoundingClientRect().height;if(h>0)c.style.minHeight=h+'px';}
  },120);
}
document.getElementById('yt-url').addEventListener('keydown',function(e){if(e.key==='Enter')loadVideo();});
window.addEventListener('resize',syncHeight);
</script>
</body>
</html>
